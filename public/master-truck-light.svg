<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">Caminhão Master em tema claro</title>
  <desc id="desc">Caminhão baú grafite com marca verde da Master Flow sobre pista molhada à noite.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dceff4"/>
      <stop offset="0.55" stop-color="#b7d2d9"/>
      <stop offset="1" stop-color="#e9f6f8"/>
